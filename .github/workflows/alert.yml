name: testingalertocta

on:
  workflow_dispatch:
  schedule:
    - cron: '45 13 * * *' # Jam 20:45 WIB (13:45 UTC)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run script
        run: python Testalert1.py
